      e.preventDefault();
      e.stopPropagation();
    }, true);
  }
  function wait() {
    var el = document.getElementById(GDID);
    if (el && el._fullLayout) {
      init();
      return;
    }
    setTimeout(wait, 50);
  }
  wait();
})();
